<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A special question for Nungari...</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <!-- Floating medical kits -->
        <img src="images/kit.png" class="floating-img kit kit1" alt="Nurse Kit 1">
        <img src="images/kit.png" class="floating-img kit kit2" alt="Nurse Kit 2">
    </div>

    <div class="card" id="mainCard">
        <img src="images/cat_normal.png" class="hero-image" alt="Funny Cat Nurse">
        
        <h1 id="questionText">Nungari, will you like to add my Muiruri to your Muiruri?</h1>
        <p id="subText" class="sub-text">Please select an answer carefully...</p>
        
        <div class="buttons">
            <button id="yesBtn" class="btn yes-btn">Yes</button>
            <button id="noBtn" class="btn no-btn">No</button>
        </div>
    </div>

    <!-- Music logic is handled via script. Ensure you have a 'music.mp3' file in the directory. -->
    <script src="script.js"></script>
</body>
</html>
